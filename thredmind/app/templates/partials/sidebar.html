<aside id="sidebar" class="sidebar bg-bg-raised border-r border-border flex flex-col h-full">
    <div class="px-4 pt-4 pb-3 flex items-center gap-3">
        <button onclick="toggleSidebar()"
            class="hidden md:flex w-7 h-7 items-center justify-center rounded-lg text-fg-dim hover:text-fg hover:bg-accent-bg transition-colors flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <div class="sidebar-brand">
            <a href="/app" class="text-base font-extrabold tracking-tight text-fg leading-none">ThredMind</a>
            <p class="sidebar-brand-sub text-fg-dim text-[10px] leading-none mt-0.5">Knowledge Workspace</p>
        </div>
        <div class="sidebar-collapsed-logo hidden items-center justify-center w-7 h-7 rounded-lg bg-accent-bg flex-shrink-0">
            <span class="text-sm font-extrabold text-fg">T</span>
        </div>
    </div>

    <div class="px-2 space-y-0.5 flex-shrink-0">
        <a href="/app"
            class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors {{ 'bg-accent-bg text-fg' if sidebar_active == 'dashboard' else 'text-fg-muted hover:bg-accent-bg hover:text-fg' }}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            <span class="sidebar-label">Dashboard</span>
        </a>
        <a href="/study"
            class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors {{ 'bg-accent-bg text-fg' if sidebar_active == 'study' else 'text-fg-muted hover:bg-accent-bg hover:text-fg' }}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            <span class="sidebar-label">Study</span>
        </a>
        <a href="/api/documents"
            class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors {{ 'bg-accent-bg text-fg' if sidebar_active == 'documents' else 'text-fg-muted hover:bg-accent-bg hover:text-fg' }}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            <span class="sidebar-label">Documents</span>
        </a>
        <a href="/chat"
            class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors {{ 'bg-accent-bg text-fg' if sidebar_active == 'chat' else 'text-fg-muted hover:bg-accent-bg hover:text-fg' }}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
            <span class="sidebar-label">Chat</span>
        </a>
        <a href="/graph"
            class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors {{ 'bg-accent-bg text-fg' if sidebar_active == 'graph' else 'text-fg-muted hover:bg-accent-bg hover:text-fg' }}">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3" stroke-width="1.5"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12h2m14 0h2M12 3v2m0 14v2"/><circle cx="7" cy="7" r="1" fill="currentColor"/><circle cx="17" cy="17" r="1" fill="currentColor"/></svg>
            <span class="sidebar-label">Knowledge Graph</span>
        </a>
    </div>

    <div class="px-2 mt-6 flex-shrink-0">
        <p class="sidebar-section px-3 text-[10px] font-semibold text-fg-dim uppercase tracking-widest mb-2">Add Knowledge</p>
        <a href="/api/documents/upload" class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-fg bg-accent-bg hover:bg-accent-bg/50 transition-colors mb-0.5">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
            <span class="sidebar-label">Upload Document</span>
        </a>
        <a href="/api/documents/upload" class="sidebar-btn flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-fg-muted hover:bg-accent-bg hover:text-fg transition-colors">
            <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/></svg>
            <span class="sidebar-label">Import URL</span>
        </a>
    </div>

    <div class="sidebar-label mt-auto px-2 pb-4 border-t border-border mx-2 pt-4">
        <div class="flex items-center justify-between mb-3 px-1">
            <span class="text-[10px] text-fg-dim uppercase tracking-widest font-semibold">Theme</span>
            <div class="flex items-center gap-0.5 bg-bg-input rounded-lg p-0.5">
                <button onclick="setTheme('light')" data-theme-btn="light"
                    class="px-2 py-1 rounded-md text-xs text-fg-dim transition-colors hover:text-fg">&#9728;</button>
                <button onclick="setTheme('dark')" data-theme-btn="dark"
                    class="px-2 py-1 rounded-md text-xs text-fg-dim transition-colors hover:text-fg">&#9790;</button>
                <button onclick="setTheme('crimson')" data-theme-btn="crimson"
                    class="px-2 py-1 rounded-md text-xs text-fg-dim transition-colors hover:text-fg">&#9679;</button>
            </div>
        </div>
        <div class="flex items-center justify-between px-1">
            {% if user %}
            <span class="sidebar-user-detail text-xs text-fg-dim truncate max-w-[130px]">{{ user.email }}</span>
            <a href="/auth/logout" class="text-xs text-fg-dim hover:text-error transition-colors flex-shrink-0">Logout</a>
            {% else %}
            <span class="sidebar-user-detail text-xs text-fg-dim truncate max-w-[130px]">Welcome</span>
            <a href="/auth/login" class="text-xs text-fg-dim hover:text-fg transition-colors flex-shrink-0">Login</a>
            {% endif %}
        </div>
    </div>
</aside>
<div class="sidebar-backdrop" onclick="closeSidebar()"></div>
