<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default('dark') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ThredMind{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }

        :root {
            --bg: #09090b;
            --bg-raised: #121214;
            --bg-card: #18181b;
            --bg-input: #18181b;
            --border: #27272a;
            --border-hover: #3f3f46;
            --text: #fafafa;
            --text-muted: #a1a1aa;
            --text-dim: #71717a;
            --accent: #fafafa;
            --accent-hover: #ffffff;
            --accent-bg: rgba(250,250,250,0.06);
            --accent-text: #09090b;
            --error: #f87171;
            --sidebar-w: 260px;
        }

        html[data-theme="light"] {
            --bg: #fafafa;
            --bg-raised: #f4f4f5;
            --bg-card: #ffffff;
            --bg-input: #f4f4f5;
            --border: #e4e4e7;
            --border-hover: #d4d4d8;
            --text: #18181b;
            --text-muted: #52525b;
            --text-dim: #a1a1aa;
            --accent: #18181b;
            --accent-hover: #27272a;
            --accent-bg: rgba(24,24,27,0.05);
            --accent-text: #fafafa;
            --error: #dc2626;
        }

        html[data-theme="crimson"] {
            --bg: #0c0a09;
            --bg-raised: #161110;
            --bg-card: #1c1415;
            --bg-input: #1c1415;
            --border: #2d1f21;
            --border-hover: #4a2d30;
            --text: #fef2f2;
            --text-muted: #cbd5e1;
            --text-dim: #78716c;
            --accent: #e11d48;
            --accent-hover: #f43f5e;
            --accent-bg: rgba(225,29,72,0.08);
            --accent-text: #ffffff;
            --error: #fda4af;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: 'var(--bg)',
                        'bg-raised': 'var(--bg-raised)',
                        'bg-card': 'var(--bg-card)',
                        'bg-input': 'var(--bg-input)',
                        border: 'var(--border)',
                        'border-hover': 'var(--border-hover)',
                        fg: 'var(--text)',
                        'fg-muted': 'var(--text-muted)',
                        'fg-dim': 'var(--text-dim)',
                        accent: 'var(--accent)',
                        'accent-hover': 'var(--accent-hover)',
                        'accent-bg': 'var(--accent-bg)',
                        'accent-text': 'var(--accent-text)',
                        error: 'var(--error)',
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar {
            width: var(--sidebar-w);
            transition: transform 0.25s ease, width 0.25s ease;
            flex-shrink: 0;
        }
        .sidebar.collapsed { width: 64px; }
        .sidebar.collapsed .sidebar-label,
        .sidebar.collapsed .sidebar-section,
        .sidebar.collapsed .sidebar-brand-sub,
        .sidebar.collapsed .sidebar-user-detail,
        .sidebar.collapsed .sidebar-brand { display: none; }
        .sidebar.collapsed .sidebar-collapsed-logo { display: flex; }
        .sidebar.collapsed .sidebar-btn { justify-content: center; padding-left: 0; padding-right: 0; }
        .sidebar.collapsed .sidebar-btn svg { margin: 0; }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0; z-index: 50;
                transform: translateX(-100%);
                box-shadow: none;
            }
            .sidebar.open { transform: translateX(0); box-shadow: 0 0 0 9999px rgba(0,0,0,0.4); }
            .sidebar-backdrop { display: none; }
            .sidebar-backdrop.active { display: block; position: fixed; inset: 0; z-index: 49; background: rgba(0,0,0,0.4); }
        }

        .htmx-indicator { opacity: 0; transition: opacity 200ms ease-in; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }
    </style>
    <script>
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.cookie = 'theme=' + theme + ';path=/;max-age=31536000;SameSite=Lax';
            document.querySelectorAll('[data-theme-btn]').forEach(b => {
                b.classList.remove('bg-border', 'text-fg', 'font-medium');
                b.classList.add('text-fg-dim');
            });
            const active = document.querySelector('[data-theme-btn="' + theme + '"]');
            if (active) {
                active.classList.add('bg-border', 'text-fg', 'font-medium');
                active.classList.remove('text-fg-dim');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const current = document.documentElement.getAttribute('data-theme');
            if (current) setTheme(current);
            
            // Initialize Mermaid
            if (typeof mermaid !== 'undefined') {
                mermaid.initialize({ 
                    startOnLoad: false,
                    suppressErrorRendering: true,
                    theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark'
                });
            }
        });

        function toggleSidebar() { document.getElementById('sidebar')?.classList.toggle('collapsed'); }
        function openSidebar() {
            document.getElementById('sidebar')?.classList.add('open');
            document.querySelector('.sidebar-backdrop')?.classList.add('active');
        }
        function closeSidebar() {
            document.getElementById('sidebar')?.classList.remove('open');
            document.querySelector('.sidebar-backdrop')?.classList.remove('active');
        }
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeSidebar(); });
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-bg text-fg min-h-screen antialiased">
    <div class="flex h-screen overflow-hidden">
        {% if user %}
        {% include "partials/sidebar.html" %}
        {% endif %}
        
        <div class="flex-1 overflow-auto min-w-0">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
